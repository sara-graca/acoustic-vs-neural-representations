stages:
  parse_corpus:
    cmd: python src/parse_corpus.py
    deps:
      - data/raw/ru-fr_interference
      - src/parse_corpus.py
    outs:
      - data/parsed/phonemes.csv

  extract_acoustics:
      cmd: python src/extract_acoustics.py
      deps:
        - data/parsed/phonemes.csv
        - src/extract_acoustics.py
      params:
        - params.yaml:
            - acoustics
      outs:
        - data/features/features_acoustic.csv

  # extract_neural_whisper and extract_neural_xlsr were run on Kaggle (GPU required)
  # outputs tracked manually via dvc add
  
  normalise:
      cmd: python src/normalise.py
      deps:
        - data/features/features_acoustic.csv
        - data/features/features_whisper_layer20.npz
        - data/features/features_whisper_layer4.npz
        - data/features/features_xlsr_layer20.npz
        - data/features/features_xlsr_layer10.npz
        - data/features/features_xlsr_layer3.npz
        - src/normalise.py
      params:
        - params.yaml:
            - normalise
      outs:
        - data/features/features_acoustic_norm.csv
        - data/features/features_whisper_layer20_pca.npz
        - data/features/features_whisper_layer4_pca.npz
        - data/features/features_xlsr_layer20_pca.npz
        - data/features/features_xlsr_layer10_pca.npz
        - data/features/features_xlsr_layer3_pca.npz
  
  descriptive_acoustic:
    cmd: python src/descriptive_acoustic.py
    deps:
      - data/features/features_acoustic_norm.csv
      - src/descriptive_acoustic.py
    outs:
      - results/figures/vowel_chart.pdf
      - results/figures/vowel_chart.png
      - results/figures/boxplot_F1_norm.pdf
      - results/figures/boxplot_F1_norm.png
      - results/figures/boxplot_F2_norm.pdf
      - results/figures/boxplot_F2_norm.png
      - results/figures/violin_F1_norm.pdf
      - results/figures/violin_F1_norm.png
      - results/figures/violin_F2_norm.pdf
      - results/figures/violin_F2_norm.png
      - results/tables/descriptive_acoustic.csv

  descriptive_neural:
    cmd: python src/descriptive_neural.py
    deps:
      - data/features/features_acoustic_norm.csv
      - data/features/features_whisper_layer20_pca.npz
      - data/features/features_whisper_layer4_pca.npz
      - data/features/features_xlsr_layer20_pca.npz
      - data/features/features_xlsr_layer10_pca.npz
      - data/features/features_xlsr_layer3_pca.npz
      - src/descriptive_neural.py
    outs:
      - results/figures/neural_whisper_layer20_pca_phoneme.png
      - results/figures/neural_whisper_layer20_pca_l1_status.png
      - results/figures/neural_whisper_layer20_pca_gender.png
      - results/figures/neural_whisper_layer20_umap_phoneme.png
      - results/figures/neural_whisper_layer20_umap_l1_status.png
      - results/figures/neural_whisper_layer20_umap_gender.png
      - results/figures/neural_whisper_layer4_pca_phoneme.png
      - results/figures/neural_whisper_layer4_pca_l1_status.png
      - results/figures/neural_whisper_layer4_pca_gender.png
      - results/figures/neural_whisper_layer4_umap_phoneme.png
      - results/figures/neural_whisper_layer4_umap_l1_status.png
      - results/figures/neural_whisper_layer4_umap_gender.png
      - results/figures/neural_xlsr_layer20_pca_phoneme.png
      - results/figures/neural_xlsr_layer20_pca_l1_status.png
      - results/figures/neural_xlsr_layer20_pca_gender.png
      - results/figures/neural_xlsr_layer20_umap_phoneme.png
      - results/figures/neural_xlsr_layer20_umap_l1_status.png
      - results/figures/neural_xlsr_layer20_umap_gender.png
      - results/figures/neural_xlsr_layer10_pca_phoneme.png
      - results/figures/neural_xlsr_layer10_pca_l1_status.png
      - results/figures/neural_xlsr_layer10_pca_gender.png
      - results/figures/neural_xlsr_layer10_umap_phoneme.png
      - results/figures/neural_xlsr_layer10_umap_l1_status.png
      - results/figures/neural_xlsr_layer10_umap_gender.png
      - results/figures/neural_xlsr_layer3_pca_phoneme.png
      - results/figures/neural_xlsr_layer3_pca_l1_status.png
      - results/figures/neural_xlsr_layer3_pca_gender.png
      - results/figures/neural_xlsr_layer3_umap_phoneme.png
      - results/figures/neural_xlsr_layer3_umap_l1_status.png
      - results/figures/neural_xlsr_layer3_umap_gender.png
      - results/tables/neural_variance_ratio.csv
      - results/tables/neural_cosine_similarity.csv

  descriptive_crossrep:
    cmd: python src/descriptive_crossrep.py
    deps:
      - data/features/features_acoustic_norm.csv
      - data/features/features_whisper_layer20_pca.npz
      - data/features/features_whisper_layer4_pca.npz
      - data/features/features_xlsr_layer20_pca.npz
      - data/features/features_xlsr_layer10_pca.npz
      - data/features/features_xlsr_layer3_pca.npz
      - src/descriptive_crossrep.py
    outs:
      - results/tables/mantel_tests.csv

  tests_acoustic_l1l2:
    cmd: python src/tests_acoustic_l1l2.py
    deps:
      - data/features/features_acoustic_norm.csv
      - src/tests_acoustic_l1l2.py
    outs:
      - results/tables/l1_l2_acoustic_tests.csv

  tests_acoustic_gender:
    cmd: python src/tests_acoustic_gender.py
    deps:
      - data/features/features_acoustic_norm.csv
      - src/tests_acoustic_gender.py
    outs:
      - results/tables/gender_acoustic_tests.csv
  
  tests_neural_l1l2:
    cmd: python src/tests_neural_l1l2.py
    deps:
      - data/features/features_acoustic_norm.csv
      - data/features/features_whisper_layer4_pca.npz
      - data/features/features_xlsr_layer3_pca.npz
      - src/tests_neural_l1l2.py
    outs:
      - results/tables/l1_l2_neural_tests.csv

  tests_inter_distances:
    cmd: python src/tests_inter_distances.py
    deps:
      - data/features/features_acoustic_norm.csv
      - data/features/features_whisper_layer4_pca.npz
      - data/features/features_xlsr_layer3_pca.npz
      - src/tests_inter_distances.py
    params:
      - params.yaml:
        - tests_inter_distances
    outs:
      - results/tables/distance_mantel.csv
      - results/tables/distance_bootstrap_ci.csv
      - results/figures/distance_matrices.png
  
  nearest_centroid_classifier:
    cmd: python src/nearest_centroid_classifier.py
    deps:
      - data/features/features_acoustic_norm.csv
      - data/features/features_whisper_layer4_pca.npz
      - data/features/features_xlsr_layer3_pca.npz
      - src/nearest_centroid_classifier.py
    params:
      - params.yaml:
        - tests_inter_distances.vowels
    outs:
      - results/tables/classifier_summary.csv
      - results/tables/classifier_mcnemar.csv
      - results/figures/confusion_acoustic.png
      - results/figures/confusion_whisper_layer4.png
      - results/figures/confusion_xlsr_layer3.png